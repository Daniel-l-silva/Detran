<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        h1 {
            color: #333;
        }

        input[type="number"] {
            padding: 5px;
            margin-right: 10px;
        }

        input[type="button"] {
            padding: 5px 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="button"]:hover {
            background-color: #0056b3;
        }

        #res {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Sistema de Multas</h1>
    <p>Velocidade do carro: <input type="number" name="txtvel" id="txtvel"> km/h</p>
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res"></div>

    <script>
        function calcular() {
        var txtvel = document.querySelector('input#txtvel')
        var res = document.querySelector('div#res')
        var vel = Number(txtvel.value)
        res.innerHTML = `<p>A velocidade do carro é ${vel} km/h.</p>`
        if (vel > 60) {
            res.innerHTML += `<p>Você ultrapassou a velocidade permitida. MULTADO!</p>`
        } else if (vel <= 60) {
            res.innerHTML += `<p>Você está dentro da velocidade permitida.</p>`
        }
    
        res.innerHTML += `<p>Dirija sempre usando cinto de segurança!</p>`
    } 
    </script>
</body>
</html>
